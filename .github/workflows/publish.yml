# Publish com.agentadmit:agentadmit-sdk to Maven Central
#
# Maven Central has no OIDC trusted publishing — releases are GPG-signed and
# pushed through the Sonatype Central Publishing plugin already configured in
# pom.xml (publishingServerId: central, autoPublish: true).
#
# Prerequisites (one-time setup):
#   1. central.sonatype.com account verified for the com.agentadmit namespace
#   2. Generate a Central Portal user token → repo secrets:
#      - CENTRAL_USERNAME / CENTRAL_PASSWORD
#   3. GPG release key (the public key uploaded to keys.openpgp.org) →
#      repo secrets:
#      - GPG_PRIVATE_KEY (ASCII-armored private key)
#      - GPG_PASSPHRASE
#
# Trigger: push a version tag (e.g., git tag v1.0.0 && git push --tags)
# Action versions are pinned to exact SHAs per supply chain policy.

name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Check tag matches project version
        run: |
          pkg="v$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pom.xml version $pkg" >&2
            exit 1
          fi

      - name: Run tests
        run: mvn --batch-mode test

      - name: Deploy to Maven Central
        run: mvn --batch-mode deploy -DskipTests
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
